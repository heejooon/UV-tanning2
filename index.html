<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UV & Weather Tracker Hybrid v6.4</title>
    <meta name="theme-color" content="#FF8A00"/>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #F8FAFC; -webkit-tap-highlight-color: transparent; }
        .card { background: white; border-radius: 28px; box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.04); overflow: hidden; border: 1px solid rgba(0,0,0,0.02); }
        .chart-container { max-height: 0; overflow: hidden; transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); opacity: 0; }
        .chart-container.open { max-height: 320px; opacity: 1; padding-bottom: 20px; }
        .rotate-180 { transform: rotate(180deg); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .scroll-chart-wrapper { 
            width: 100%; 
            overflow-x: auto; 
            cursor: grab;
            position: relative;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }
        canvas { display: block; height: 210px !important; }
        .btn-update { background: #FF8A00; box-shadow: 0 4px 12px rgba(255, 138, 0, 0.3); }
        
        /* [Theme] Golden Time Card */
        .golden-card-wait { background: linear-gradient(135deg, #FFD600 0%, #FF9900 100%); }
        .golden-card-today { background: linear-gradient(135deg, #FF8A00 0%, #E11D48 100%); }
        .golden-card-tomorrow { background: linear-gradient(135deg, #3B82F6 0%, #1E40AF 45%, #0F172A 85%, #020617 100%); }
    </style>
</head>
<body class="p-2 md:p-3 max-w-2xl mx-auto pb-16">

    <!-- Current Information Card -->
    <div class="card p-7 py-5 mb-4 relative">
        <div class="flex items-center justify-between mb-3">
            <div class="flex flex-col">
                <span class="text-[11px] text-gray-400 font-normal uppercase tracking-[0.2em] mb-2">Current UV Index</span>
                <div class="flex items-baseline gap-3">
                    <span id="uvValue" class="text-8xl font-black text-[#FF8A00] tracking-tighter leading-none">--</span>
                    <span id="uvBadge" class="bg-gray-100 text-gray-400 px-3 py-1.5 rounded-xl text-[11px] font-bold uppercase tracking-wider relative -top-4 transition-all duration-500">Wait</span>
                </div>
            </div>
            <div class="flex flex-col items-end">
                <span id="currentWeatherDesc" class="text-sm font-normal text-gray-400 mb-1">--</span>
                <span id="currentTemp" class="text-5xl font-black text-gray-800 leading-none tracking-tight">--°</span>
            </div>
        </div>
        
        <div class="bg-slate-50 rounded-2xl px-3.5 py-2 mb-3 border border-slate-100/50">
            <p id="uvDesc" class="text-slate-600 text-[13px] font-normal leading-relaxed break-keep">
                실시간 자외선 정보를 불러오고 있습니다...
            </p>
        </div>

        <div class="flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="flex items-center gap-1.5 bg-slate-100/50 px-3 py-2 rounded-full border border-slate-200/50">
                    <i data-lucide="map-pin" class="w-3.5 h-3.5 text-blue-500"></i>
                    <span id="locationName" class="text-[11px] font-medium text-slate-600 truncate max-w-[120px]">위치 찾는 중...</span>
                </div>
                <div class="flex items-center gap-1.5 bg-slate-100/50 px-3 py-2 rounded-full border border-slate-200/50">
                    <i data-lucide="clock" class="w-3.5 h-3.5 text-orange-400"></i>
                    <span id="lastUpdate" class="text-[11px] font-medium text-slate-600">--:--</span>
                </div>
            </div>
            <button id="updateBtn" onclick="initLocation()" class="btn-update text-white w-12 h-12 rounded-2xl flex items-center justify-center transition-all active:scale-95 hover:brightness-110 shadow-lg shrink-0">
                <i id="updateIcon" data-lucide="refresh-cw" class="w-5 h-5"></i>
            </button>
        </div>
    </div>

    <!-- Golden Time Card -->
    <div id="goldenTimeCard" class="card p-6 mb-4 golden-card-wait text-white border-none transition-colors duration-700">
        <div class="flex items-start justify-between">
            <div class="flex items-center gap-2">
                <div class="w-1.5 h-4 bg-white/40 rounded-full"></div>
                <h2 id="goldenTitle" class="text-[11px] font-semibold uppercase tracking-[0.2em] opacity-90 leading-none">Today's Golden Time</h2>
            </div>
            
            <div class="flex flex-col items-end text-right">
                <span class="text-[10px] font-normal opacity-80 lowercase tracking-widest leading-none mb-1">available</span>
                <span id="totalDurationValue" class="text-5xl tracking-tighter leading-none">--</span>
            </div>
        </div>

        <div class="flex items-end justify-between mt-4">
            <div class="flex flex-col">
                <!-- 복구된 폰트 사이즈: 5xl -->
                <div id="goldenTime" class="text-5xl font-normal tracking-tighter leading-none italic">-- ~ --</div>
                <div class="mt-3 flex items-center gap-2">
                    <span id="goldenTag" class="px-2 py-0.5 bg-white/20 rounded text-[9px] font-bold tracking-widest uppercase">Best Time</span>
                </div>
            </div>
            
            <div class="flex flex-col items-end opacity-80 mb-1">
                <span class="text-[9px] font-medium uppercase tracking-[0.15em] opacity-70">Peak UV Index</span>
                <div class="flex items-baseline gap-1.5">
                    <span id="peakUvValue" class="text-2xl font-light leading-none">--</span>
                    <span id="peakTimeValue" class="text-[10px] font-medium opacity-60">@ --:00</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Main Chart Card -->
    <div class="card p-7 mb-4">
        <div id="mainChartWrapper" class="scroll-chart-wrapper no-scrollbar mb-4">
            <canvas id="uvChart"></canvas>
        </div>
        
        <div class="flex gap-4 pt-2 no-scrollbar text-[10px] font-normal text-slate-400 uppercase tracking-widest border-t border-slate-50">
            <div class="flex items-center gap-1.5 shrink-0"><span class="w-2.5 h-2.5 rounded-full bg-[#FF8A00]"></span> <span>UV Index</span></div>
            <div class="flex items-center gap-1.5 shrink-0"><span class="w-2.5 h-2.5 rounded-full bg-blue-400"></span> <span>Temp</span></div>
            <div class="flex items-center gap-1.5 shrink-0"><span class="w-2.5 h-1 rounded-full bg-red-400"></span> <span>Golden Time</span></div>
        </div>
    </div>

    <!-- Weekly Forecast -->
    <div class="card p-7 mb-4">
        <div class="flex items-center justify-between mb-6">
            <h2 class="text-slate-800 font-normal text-xl flex items-center gap-2.5 tracking-tight">
                <i data-lucide="calendar-days" class="w-6 h-6 text-blue-500"></i>
                주간 태닝 예보
            </h2>
            <span class="text-[10px] font-normal text-slate-300 uppercase tracking-widest">7 Days</span>
        </div>
        <div id="weeklyList" class="space-y-1">
            <div class="flex justify-center py-12"><div class="w-8 h-8 border-[4px] border-orange-100 border-t-orange-500 rounded-full animate-spin"></div></div>
        </div>
    </div>

    <script>
        let uvData = [], tempData = [], hourlyWeather = [], weeklyData = [];
        let displayUV = [], displayTemp = [], displayWeather = [];
        let currentLat = 37.5038, currentLon = 126.7535;

        const weatherIcons = {
            0: { icon: "sun", color: "#FFB800" },
            1: { icon: "cloud-sun", color: "#64748B" }, 
            2: { icon: "cloud-sun", color: "#64748B" }, 
            3: { icon: "cloud", color: "#94A3B8" },
            45: { icon: "cloud-fog", color: "#94A3B8" },
            48: { icon: "cloud-fog", color: "#94A3B8" },
            51: { icon: "cloud-drizzle", color: "#60A5FA" },
            53: { icon: "cloud-drizzle", color: "#60A5FA" },
            55: { icon: "cloud-drizzle", color: "#60A5FA" },
            61: { icon: "cloud-rain", color: "#3B82F6" },
            63: { icon: "cloud-rain", color: "#3B82F6" },
            65: { icon: "cloud-rain", color: "#3B82F6" },
            80: { icon: "cloud-rain", color: "#60A5FA" },
            81: { icon: "cloud-rain", color: "#3B82F6" },
            82: { icon: "cloud-rain", color: "#1E40AF" },
            95: { icon: "cloud-lightning", color: "#7C3AED" },
            96: { icon: "cloud-lightning", color: "#7C3AED" },
            99: { icon: "cloud-lightning", color: "#7C3AED" }
        };

        const weatherMap = { 0: "맑음", 1: "대체로 맑음", 2: "구름 조금", 3: "흐림", 45: "안개", 51: "이슬비", 61: "비", 80: "소나기", 95: "뇌우" };

        function getWeatherIconHtml(code, size = 32) {
            const config = weatherIcons[code] || { icon: "thermometer", color: "#94A3B8" };
            return `<i data-lucide="${config.icon}" style="color: ${config.color}; width: ${size}px; height: ${size}px;"></i>`;
        }

        function getWeatherDesc(code) { return weatherMap[code] || "보통"; }
        function isBadWeather(code) { return code >= 51; }

        async function initLocation() {
            const btn = document.getElementById("updateBtn");
            const icon = document.getElementById("updateIcon");
            if(btn) btn.disabled = true; 
            if(icon) icon.classList.add("animate-spin");
            
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (pos) => { currentLat = pos.coords.latitude; currentLon = pos.coords.longitude; fetchData(); },
                    () => { fetchData(); },
                    { timeout: 6000 }
                );
            } else { fetchData(); }
        }

        async function fetchData() {
            try {
                const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${currentLat}&longitude=${currentLon}&current=temperature_2m,uv_index,weather_code&hourly=uv_index,temperature_2m,weather_code&daily=uv_index_max,weather_code&timezone=Asia%2FSeoul`);
                const data = await res.json();
                const nowHour = new Date().getHours();

                uvData = [...data.hourly.uv_index];
                tempData = [...data.hourly.temperature_2m];
                hourlyWeather = [...data.hourly.weather_code];
                weeklyData = data.daily;

                displayUV = [...uvData];
                displayTemp = [...tempData];
                displayWeather = [...hourlyWeather];

                displayUV[nowHour] = data.current.uv_index;
                displayTemp[nowHour] = data.current.temperature_2m;
                displayWeather[nowHour] = data.current.weather_code;
                
                updateUI(data.current);
                renderWeekly();
                
                const startIdx = Math.max(0, nowHour - 3); 
                const endIdx = startIdx + 24; 
                
                drawScrollableChart("uvChart", displayUV.slice(startIdx, endIdx), displayTemp.slice(startIdx, endIdx), displayWeather.slice(startIdx, endIdx), startIdx, true);
                fetchLocationName(currentLat, currentLon);
            } catch (e) {
                console.error(e);
            } finally {
                const btn = document.getElementById("updateBtn");
                const icon = document.getElementById("updateIcon");
                if(btn) btn.disabled = false;
                if(icon) icon.classList.remove("animate-spin");
                lucide.createIcons();
            }
        }

        // Helper to format duration with mixed weights
        function setDurationHtml(element, hours, minutes = 0) {
            let html = "";
            if (hours > 0) {
                html += `<span class="font-black">${hours}</span><span class="font-normal text-[20px] opacity-70 ml-0.5 mr-1">h</span>`;
            }
            if (minutes > 0 || (hours === 0 && minutes === 0)) {
                html += `<span class="font-black">${minutes}</span><span class="font-normal text-[20px] opacity-70 ml-0.5">m</span>`;
            }
            element.innerHTML = html;
        }

        function updateUI(current) {
            const now = new Date();
            const nowH = now.getHours();
            const nowM = now.getMinutes();

            document.getElementById("uvValue").innerText = current.uv_index.toFixed(1);
            document.getElementById("currentTemp").innerText = Math.round(current.temperature_2m) + "°";
            document.getElementById("currentWeatherDesc").innerText = getWeatherDesc(current.weather_code);
            document.getElementById("lastUpdate").innerText = nowH.toString().padStart(2, '0') + ":" + nowM.toString().padStart(2, '0');
            
            let todayStart = -1, todayEnd = -1;
            for (let i = 0; i < 24; i++) {
                if (displayUV[i] >= 6 && !isBadWeather(displayWeather[i])) {
                    if (todayStart === -1) todayStart = i;
                    todayEnd = i;
                }
            }

            const isTodayOver = todayEnd !== -1 && nowH >= (todayEnd + 1);
            const useTomorrow = isTodayOver || todayStart === -1;

            const startSearch = useTomorrow ? 24 : 0;
            const endSearch = useTomorrow ? 48 : 24;
            
            let start = -1, end = -1;
            let peakVal = 0;
            let peakTimeAbs = 0; 
            let totalAvailableHours = 0;

            for (let i = startSearch; i < endSearch; i++) {
                const uv = displayUV[i];
                const weather = displayWeather[i];
                if (uv > peakVal) { peakVal = uv; peakTimeAbs = i; }
                if (uv >= 6 && !isBadWeather(weather)) {
                    if (start === -1) start = i;
                    end = i;
                    totalAvailableHours++;
                }
            }

            const card = document.getElementById("goldenTimeCard");
            const title = document.getElementById("goldenTitle");
            const timeDisplay = document.getElementById("goldenTime");
            const tag = document.getElementById("goldenTag");
            const durationValue = document.getElementById("totalDurationValue");

            card.classList.remove("golden-card-wait", "golden-card-today", "golden-card-tomorrow");

            if (useTomorrow) {
                card.classList.add("golden-card-tomorrow");
                title.innerText = "Tomorrow's Golden Time";
                tag.innerText = "Next Opportunity";
                
                if (start !== -1) {
                    timeDisplay.innerText = `${start % 24} ~ ${(end + 1) % 24}`;
                    setDurationHtml(durationValue, totalAvailableHours);
                } else {
                    timeDisplay.innerText = "내일 없음";
                    setDurationHtml(durationValue, 0);
                }
            } else {
                title.innerText = "Today's Golden Time";
                tag.innerText = "Best Time";
                
                if (start !== -1) {
                    timeDisplay.innerText = `${start} ~ ${end + 1}`;
                    const endTimeHour = end + 1;
                    
                    if (nowH >= start && nowH < endTimeHour) {
                        card.classList.add("golden-card-today");
                        const diffMin = (endTimeHour * 60) - (nowH * 60 + nowM);
                        const h = Math.floor(diffMin / 60);
                        const m = diffMin % 60;
                        setDurationHtml(durationValue, h, m);
                    } else if (nowH < start) {
                        card.classList.add("golden-card-wait");
                        setDurationHtml(durationValue, totalAvailableHours);
                    } else {
                        card.classList.add("golden-card-tomorrow");
                        setDurationHtml(durationValue, 0);
                    }
                } else {
                    card.classList.add("golden-card-tomorrow");
                    timeDisplay.innerText = "오늘 없음";
                    setDurationHtml(durationValue, 0);
                }
            }

            document.getElementById("peakUvValue").innerText = peakVal.toFixed(1);
            document.getElementById("peakTimeValue").innerText = `@ ${peakTimeAbs % 24}:00`;

            const badge = document.getElementById("uvBadge");
            const desc = document.getElementById("uvDesc");
            const uv = current.uv_index;

            if (uv >= 8) {
                badge.innerText = "위험"; badge.className = "bg-red-500 text-white px-3 py-1.5 rounded-xl text-[11px] font-bold uppercase tracking-wider relative -top-4";
                desc.innerText = "자외선이 매우 강합니다. 노출을 자제하세요.";
            } else if (uv >= 6) {
                badge.innerText = "최적"; badge.className = "bg-[#FF8A00] text-white px-3 py-1.5 rounded-xl text-[11px] font-bold uppercase tracking-wider relative -top-4";
                desc.innerText = "태닝 효율이 최상인 골든타임입니다!";
            } else {
                badge.innerText = "낮음"; badge.className = "bg-gray-400 text-white px-3 py-1.5 rounded-xl text-[11px] font-bold uppercase tracking-wider relative -top-4";
                desc.innerText = "자외선 지수가 낮습니다. 태닝 효율이 떨어집니다.";
            }
        }

        function drawWeatherIconOnChart(ctx, x, y, code) {
            const config = weatherIcons[code] || { icon: "sun", color: "#FFB800" };
            ctx.save(); ctx.translate(x, y); ctx.strokeStyle = config.color; ctx.fillStyle = config.color; ctx.lineWidth = 1.4; ctx.lineCap = "round"; ctx.lineJoin = "round";
            if (code === 0) { ctx.beginPath(); ctx.arc(0, 0, 3.5, 0, Math.PI * 2); ctx.stroke(); for(let a=0; a<360; a+=45) { const rad = a * Math.PI / 180; ctx.beginPath(); ctx.moveTo(Math.cos(rad)*5.5, Math.sin(rad)*5.5); ctx.lineTo(Math.cos(rad)*7.5, Math.sin(rad)*7.5); ctx.stroke(); }
            } else if (code === 1 || code === 2) { ctx.save(); ctx.translate(2.5, -2.5); ctx.beginPath(); ctx.arc(0, 0, 2.5, 0, Math.PI * 2); ctx.stroke(); for(let a=0; a<360; a+=90) { const rad = a * Math.PI / 180; ctx.beginPath(); ctx.moveTo(Math.cos(rad)*3.5, Math.sin(rad)*3.5); ctx.lineTo(Math.cos(rad)*4.5, Math.sin(rad)*4.5); ctx.stroke(); } ctx.restore(); ctx.beginPath(); ctx.moveTo(-4, 2); ctx.bezierCurveTo(-6, 2, -6, -1, -4, -1); ctx.bezierCurveTo(-4, -3, -1, -3, 0, -1); ctx.bezierCurveTo(1, -3, 4, -3, 4, -1); ctx.bezierCurveTo(6, -1, 6, 2, 4, 2); ctx.closePath(); ctx.fillStyle = "white"; ctx.fill(); ctx.stroke();
            } else if (code === 3) { ctx.beginPath(); ctx.moveTo(-4, 2); ctx.bezierCurveTo(-6, 2, -6, -1, -4, -1); ctx.bezierCurveTo(-4, -3, -1, -3, 1, -1); ctx.bezierCurveTo(3, -3, 6, -3, 6, -1); ctx.bezierCurveTo(8, -1, 8, 2, 6, 2); ctx.closePath(); ctx.stroke();
            } else if (code >= 51 && code <= 82) { ctx.beginPath(); ctx.moveTo(-4, 1); ctx.bezierCurveTo(-6, 1, -6, -2, -4, -2); ctx.bezierCurveTo(-4, -4, -1, -4, 1, -2); ctx.bezierCurveTo(3, -4, 6, -4, 6, -2); ctx.bezierCurveTo(8, -2, 8, 1, 6, 1); ctx.closePath(); ctx.stroke(); ctx.beginPath(); ctx.moveTo(-1, 4); ctx.lineTo(-2, 7); ctx.moveTo(3, 4); ctx.lineTo(2, 7); ctx.stroke();
            } else { ctx.beginPath(); ctx.arc(0, 0, 4, 0, Math.PI * 2); ctx.fill(); }
            ctx.restore();
        }

        function drawScrollableChart(id, uvs, temps, codes, startTime, isToday) {
            const canvas = document.getElementById(id); if (!canvas) return;
            const ctx = canvas.getContext("2d"); const wrapper = canvas.parentElement; const dpr = window.devicePixelRatio || 1;
            const step = 45; const px = 24; const totalWidth = (uvs.length - 1) * step + (px * 2); const h = 210;
            canvas.style.width = totalWidth + "px"; canvas.width = totalWidth * dpr; canvas.height = h * dpr;
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0); 
            const nowH = new Date().getHours(); ctx.clearRect(0, 0, totalWidth, h);
            uvs.forEach((uv, i) => {
                const x = px + i * step; const isRealNow = isToday && (startTime + i) === nowH; const isGolden = uv >= 6 && !isBadWeather(codes[i]);
                ctx.setLineDash([4, 4]); ctx.strokeStyle = isRealNow ? 'rgba(255, 138, 0, 0.7)' : 'rgba(0, 0, 0, 0.05)'; ctx.lineWidth = isRealNow ? 2 : 1; ctx.beginPath(); ctx.moveTo(x, 15); ctx.lineTo(x, h - 30); ctx.stroke(); ctx.setLineDash([]);
                if (isGolden) { const grad = ctx.createLinearGradient(0, 0, 0, h - 30); grad.addColorStop(0, 'rgba(239, 68, 68, 0.08)'); grad.addColorStop(0.5, 'rgba(239, 68, 68, 0.03)'); grad.addColorStop(1, 'rgba(239, 68, 68, 0)'); ctx.fillStyle = grad; ctx.fillRect(x - step/2, 15, step, h - 45); ctx.strokeStyle = 'rgba(239, 68, 68, 0.5)'; ctx.lineWidth = 2.5; ctx.lineCap = 'round'; ctx.beginPath(); ctx.moveTo(x - step/2 + 4, 15); ctx.lineTo(x + step/2 - 4, 15); ctx.stroke(); }
            });
            const tMin = Math.min(...temps), tMax = Math.max(...temps), tRange = (tMax - tMin) || 5; const getTempY = (t) => 85 - ((t - tMin) / tRange) * 30;
            ctx.beginPath(); ctx.strokeStyle = 'rgba(96, 165, 250, 0.3)'; ctx.lineWidth = 1.5; temps.forEach((t, i) => { const x = px + i * step; if (i === 0) ctx.moveTo(x, getTempY(t)); else ctx.lineTo(x, getTempY(t)); }); ctx.stroke();
            temps.forEach((t, i) => { const x = px + i * step; ctx.fillStyle = 'rgba(59, 130, 246, 0.8)'; ctx.font = '400 9px Inter'; ctx.textAlign = 'center'; ctx.fillText(Math.round(t) + "°", x, getTempY(t) - 8); });
            ctx.beginPath(); ctx.strokeStyle = '#FF8A00'; ctx.lineWidth = 3; uvs.forEach((uv, i) => { const x = px + i * step; const y = 170 - (uv * 9); if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y); }); ctx.stroke();
            uvs.forEach((uv, i) => {
                const x = px + i * step; const hour = (startTime + i) % 24; const badW = isBadWeather(codes[i]); const isRealNow = isToday && (startTime + i) === nowH; const isGolden = uv >= 6 && !isBadWeather(codes[i]);
                drawWeatherIconOnChart(ctx, x, 30, codes[i]); const uvY = 170 - (uv * 9);
                if (isGolden) { ctx.fillStyle = '#EF4444'; ctx.shadowBlur = 8; ctx.shadowColor = 'rgba(239, 68, 68, 0.5)'; } else { ctx.fillStyle = badW ? '#CBD5E1' : '#FF8A00'; ctx.shadowBlur = 0; }
                ctx.beginPath(); ctx.arc(x, uvY, isGolden ? 5 : 4.5, 0, Math.PI * 2); ctx.fill(); ctx.shadowBlur = 0; ctx.font = '700 11px Inter'; ctx.fillText(uv.toFixed(1), x, uvY - 12);
                if (isGolden) { ctx.fillStyle = '#EF4444'; ctx.font = '400 10px Inter'; } else if (isRealNow) { ctx.fillStyle = '#FF8A00'; ctx.font = '700 13px Inter'; } else { ctx.fillStyle = '#94A3B8'; ctx.font = '400 10px Inter'; }
                ctx.fillText(hour, x, h - 10);
            });
            requestAnimationFrame(() => { let targetIdx = 0; let scrollPos = 0; if (isToday) { targetIdx = uvs.findIndex((_, idx) => (startTime + idx) === nowH); if(targetIdx === -1) targetIdx = 0; scrollPos = (targetIdx * step) + px - (step * 1.5); } else { let maxVal = -1; uvs.forEach((v, idx) => { if(v > maxVal) { maxVal = v; targetIdx = idx; } }); scrollPos = (targetIdx * step) + px - (wrapper.offsetWidth / 2); } wrapper.scrollTo({ left: Math.max(0, scrollPos), behavior: 'smooth' }); });
        }

        function renderWeekly() {
            const list = document.getElementById("weeklyList"); if (!list) return;
            list.innerHTML = ""; const dayNames = ["일", "월", "화", "수", "목", "금", "토"];
            for (let i = 0; i < 7; i++) {
                const date = new Date(); date.setDate(date.getDate() + i); const maxUv = weeklyData.uv_index_max[i], wCode = weeklyData.weather_code[i];
                const badW = isBadWeather(wCode), isOptimal = maxUv >= 6 && !badW; const row = document.createElement("div"); row.className = "border-b border-slate-50 last:border-0";
                row.innerHTML = `<div onclick="toggleDay(${i})" class="flex items-center justify-between py-5 cursor-pointer active:bg-slate-50 px-3 rounded-2xl transition-all group ${badW?'opacity-60':''}"><div class="flex items-center gap-4"><span class="w-9 font-normal text-xs ${i===0?'text-blue-500 font-bold':'text-slate-400'}">${i===0?'오늘':dayNames[date.getDay()]}</span><div class="w-10 flex justify-center">${getWeatherIconHtml(wCode, 28)}</div></div><div class="flex-1 mx-5"><div class="h-2 w-full bg-slate-100 rounded-full overflow-hidden shadow-inner"><div class="h-full ${badW?'bg-slate-300':(isOptimal?'bg-orange-500':'bg-slate-300')}" style="width: ${Math.min(maxUv*10, 100)}%"></div></div></div><div class="flex items-center gap-3"><span class="text-[13px] font-bold ${isOptimal?'text-orange-500':'text-slate-400'}">${maxUv.toFixed(1)}</span><i data-lucide="chevron-down" id="arrow-${i}" class="w-4 h-4 text-slate-300 transition-transform duration-300"></i></div></div><div id="content-${i}" class="chart-container"><div class="scroll-chart-wrapper no-scrollbar"><canvas id="chart-${i}"></canvas></div></div>`;
                list.appendChild(row);
            } lucide.createIcons();
        }

        function toggleDay(i) {
            const content = document.getElementById(`content-${i}`); const arrow = document.getElementById(`arrow-${i}`); const isOpen = content.classList.contains('open');
            document.querySelectorAll('.chart-container').forEach(c => c.classList.remove('open')); document.querySelectorAll('[id^="arrow-"]').forEach(a => a.classList.remove('rotate-180'));
            if (!isOpen) { content.classList.add('open'); arrow.classList.add('rotate-180'); setTimeout(() => { const startIdx = i * 24; drawScrollableChart(`chart-${i}`, displayUV.slice(startIdx, startIdx + 24), displayTemp.slice(startIdx, startIdx + 24), displayWeather.slice(startIdx, startIdx + 24), 0, false); }, 100); }
        }

        async function fetchLocationName(lat, lon) {
            try { const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`); const data = await res.json(); const a = data.address; document.getElementById("locationName").innerText = (a.city || a.province || "내 위치") + " " + (a.suburb || ""); } catch { document.getElementById("locationName").innerText = "내 위치"; }
        }

        window.onload = () => { initLocation(); setInterval(initLocation, 600000); };
    </script>
    <!-- 테스트용 디버그 패널 (테스트 후 삭제하세요) -->
<div class="fixed bottom-4 right-4 flex flex-col gap-2 z-50 bg-white/90 backdrop-blur p-3 rounded-2xl shadow-xl border border-slate-200">
    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-wider text-center mb-1">UV Tracker Debug</p>
    <button onclick="simulateSituation('before')" class="bg-blue-500 text-white text-xs px-3 py-2 rounded-xl font-medium active:scale-95 transition-all">1. 골든타임 전 (오전 9시)</button>
    <button onclick="simulateSituation('during')" class="bg-emerald-500 text-white text-xs px-3 py-2 rounded-xl font-medium active:scale-95 transition-all">2. 골든타임 중 (낮 12시)</button>
    <button onclick="simulateSituation('after')" class="bg-slate-700 text-white text-xs px-3 py-2 rounded-xl font-medium active:scale-95 transition-all">3. 골든타임 후 (오후 6시)</button>
</div>

<script>
function simulateSituation(type) {
    // 1. 가상의 현재 시간(H)과 가상의 Open-Meteo current 데이터를 정의합니다.
    let mockHour, mockCurrent;
    
    // 24시간 가상 데이터 생성 (기본적으로 맑음 '0' 세팅)
    displayWeather = Array(168).fill(0); 
    displayUV = Array(168).fill(0.0);
    displayTemp = Array(168).fill(22.0); // 평균 기온 대입
    
    // 낮 시간대(오전 11시 ~ 오후 3시)에 자외선 지수 7.5 대입 (골든타임 조건: UV >= 6)
    for(let i = 11; i <= 15; i++) {
        displayUV[i] = 7.5;   // 오늘 낮
        displayUV[i+24] = 6.8; // 내일 낮
    }

    if (type === 'before') {
        // 상황 1: 오전 9시 (골든타임 시작인 11시 전)
        mockHour = 9;
        mockCurrent = { uv_index: 3.0, temperature_2m: 18.5, weather_code: 0 };
    } else if (type === 'during') {
        // 상황 2: 낮 12시 (골든타임 11~16시 진행 중)
        mockHour = 12;
        mockCurrent = { uv_index: 7.5, temperature_2m: 24.0, weather_code: 0 };
    } else if (type === 'after') {
        // 상황 3: 오후 6시 (오늘 골든타임 완전히 종료)
        mockHour = 18;
        mockCurrent = { uv_index: 0.5, temperature_2m: 20.0, weather_code: 0 };
    }

    // 2. 현재 시간(Date 객체)의 getHours와 getMinutes를 가짜로 가로챕니다.
    Date.prototype.getHours = function() { return mockHour; };
    Date.prototype.getMinutes = function() { return 30; }; // 매번 xx시 30분으로 고정

    // 3. 전역 display 배열의 '현재 시간' 위치에 가상 데이터 주입
    displayUV[mockHour] = mockCurrent.uv_index;
    displayTemp[mockHour] = mockCurrent.temperature_2m;
    displayWeather[mockHour] = mockCurrent.weather_code;

    // 4. UI 업데이트 함수 호출 및 차트 다시 그리기
    updateUI(mockCurrent);
    
    const startIdx = Math.max(0, mockHour - 3);
    const endIdx = startIdx + 24;
    drawScrollableChart("uvChart", displayUV.slice(startIdx, endIdx), displayTemp.slice(startIdx, endIdx), displayWeather.slice(startIdx, endIdx), startIdx, true);
}
</script>
