<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UV & Weather Tracker v3</title>
    <meta name="theme-color" content="#FF8A00"/>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #F8FAFC; -webkit-tap-highlight-color: transparent; }
        .card { background: white; border-radius: 28px; box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.04); overflow: hidden; border: 1px solid rgba(0,0,0,0.02); }
        .chart-container { max-height: 0; overflow: hidden; transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); opacity: 0; }
        .chart-container.open { max-height: 320px; opacity: 1; padding-bottom: 20px; }
        .rotate-180 { transform: rotate(180deg); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .scroll-chart-wrapper { 
            width: 100%; 
            overflow-x: auto; 
            cursor: grab;
            position: relative;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }
        canvas { display: block; height: 210px !important; }
        .btn-update { background: #FF8A00; box-shadow: 0 4px 12px rgba(255, 138, 0, 0.3); }
    </style>
</head>
<body class="p-2 md:p-3 max-w-2xl mx-auto pb-16">

    <!-- Current Information Card -->
    <div class="card p-7 mb-4 relative">
        <div class="flex items-center justify-between mb-8">
            <div class="flex flex-col">
                <span class="text-[11px] text-gray-400 font-black uppercase tracking-[0.2em] mb-2">Current UV Index</span>
                <div class="flex items-baseline gap-3">
                    <span id="uvValue" class="text-8xl font-black text-[#FF8A00] tracking-tighter leading-none">--</span>
                    <span id="uvBadge" class="bg-gray-100 text-gray-400 px-3 py-1.5 rounded-xl text-[11px] font-black uppercase tracking-wider relative -top-4 transition-all duration-500">Wait</span>
                </div>
            </div>
            <div class="flex flex-col items-end">
                <span id="currentWeatherDesc" class="text-sm font-bold text-gray-400 mb-1">--</span>
                <span id="currentTemp" class="text-5xl font-black text-gray-800 leading-none tracking-tight">--°</span>
            </div>
        </div>
        
        <div class="bg-slate-50 rounded-2xl p-3.5 mb-6 border border-slate-100/50">
            <p id="uvDesc" class="text-slate-600 text-[13px] font-semibold leading-relaxed break-keep">
                위치 정보를 확인하고 있습니다...
            </p>
        </div>

        <div class="flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="flex items-center gap-1.5 bg-slate-100/50 px-3 py-2 rounded-full border border-slate-200/50">
                    <i data-lucide="map-pin" class="w-3.5 h-3.5 text-blue-500"></i>
                    <span id="locationName" class="text-[11px] font-bold text-slate-600 truncate max-w-[120px]">위치 찾는 중...</span>
                </div>
                <div class="flex items-center gap-1.5 bg-slate-100/50 px-3 py-2 rounded-full border border-slate-200/50">
                    <i data-lucide="clock" class="w-3.5 h-3.5 text-orange-400"></i>
                    <span id="lastUpdate" class="text-[11px] font-bold text-slate-600">--:--</span>
                </div>
            </div>
            <button id="updateBtn" onclick="initLocation()" class="btn-update text-white w-12 h-12 rounded-2xl flex items-center justify-center transition-all active:scale-95 hover:brightness-110 shadow-lg shrink-0">
                <i id="updateIcon" data-lucide="refresh-cw" class="w-5 h-5"></i>
            </button>
        </div>
    </div>

    <!-- Golden Time Card -->
    <div id="goldenTimeCard" class="card p-7 mb-4 bg-gradient-to-br from-orange-500 to-[#FF8A00] text-white border-none shadow-orange-200">
        <div class="flex items-center gap-2 mb-3 opacity-90">
            <div class="p-1.5 bg-white/20 rounded-lg">
                <i data-lucide="zap" class="w-4 h-4 fill-current"></i>
            </div>
            <h2 class="font-bold text-xs uppercase tracking-widest">Today's Golden Time</h2>
        </div>
        <div id="goldenTime" class="text-5xl font-black tracking-tighter">-- ~ --</div>
    </div>

    <!-- Main Chart Card (Title Removed, Legend moved to Bottom) -->
    <div class="card p-7 mb-4">
        <div id="mainChartWrapper" class="scroll-chart-wrapper no-scrollbar mb-4">
            <canvas id="uvChart"></canvas>
        </div>
        
        <div class="flex gap-4 pt-2 no-scrollbar text-[10px] font-black text-slate-400 uppercase tracking-widest border-t border-slate-50">
            <div class="flex items-center gap-1.5 shrink-0"><span class="w-2.5 h-2.5 rounded-full bg-[#FF8A00]"></span> <span>UV Index</span></div>
            <div class="flex items-center gap-1.5 shrink-0"><span class="w-2.5 h-2.5 rounded-full bg-blue-400"></span> <span>Temp</span></div>
        </div>
    </div>

    <!-- Weekly Forecast -->
    <div class="card p-7 mb-4">
        <div class="flex items-center justify-between mb-6">
            <h2 class="text-slate-800 font-black text-xl flex items-center gap-2.5 tracking-tight">
                <i data-lucide="calendar-days" class="w-6 h-6 text-blue-500"></i>
                주간 태닝 예보
            </h2>
            <span class="text-[10px] font-black text-slate-300 uppercase tracking-widest">7 Days</span>
        </div>
        <div id="weeklyList" class="space-y-1">
            <div class="flex justify-center py-12"><div class="w-8 h-8 border-[4px] border-orange-100 border-t-orange-500 rounded-full animate-spin"></div></div>
        </div>
    </div>

    <script>
        let uvData = [], tempData = [], hourlyWeather = [], weeklyData = [];
        let currentLat = 37.5038, currentLon = 126.7535;

        const weatherEmoji = { 0: "☀️", 1: "🌤️", 2: "⛅", 3: "☁️", 45: "🌫️", 48: "🌫️", 51: "🌦️", 53: "🌦️", 55: "🌦️", 61: "🌧️", 63: "🌧️", 65: "🌧️", 80: "🌦️", 81: "🌧️", 82: "🌧️", 95: "⚡", 96: "⛈️", 99: "⛈️" };
        const weatherMap = { 0: "맑음", 1: "대체로 맑음", 2: "구름 조금", 3: "흐림", 45: "안개", 51: "이슬비", 61: "비", 80: "소나기", 95: "뇌우" };

        function getWeatherEmoji(code) { return weatherEmoji[code] || "🌡️"; }
        function getWeatherDesc(code) { return weatherMap[code] || "보통"; }
        function isBadWeather(code) { return code >= 51; }

        async function initLocation() {
            const btn = document.getElementById("updateBtn");
            const icon = document.getElementById("updateIcon");
            btn.disabled = true; icon.classList.add("animate-spin");
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (pos) => { currentLat = pos.coords.latitude; currentLon = pos.coords.longitude; fetchData(); },
                    () => { fetchData(); },
                    { timeout: 6000 }
                );
            } else { fetchData(); }
        }

        async function fetchData() {
            try {
                const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${currentLat}&longitude=${currentLon}&hourly=uv_index,temperature_2m,weather_code&daily=uv_index_max,weather_code&current_weather=true&timezone=Asia%2FSeoul`);
                const data = await res.json();
                uvData = data.hourly.uv_index;
                tempData = data.hourly.temperature_2m;
                hourlyWeather = data.hourly.weather_code;
                weeklyData = data.daily;
                updateUI(data.current_weather);
                renderWeekly();
                const nowH = new Date().getHours();
                const startIdx = Math.max(0, nowH - 3); 
                const endIdx = startIdx + 24; 
                drawScrollableChart("uvChart", uvData.slice(startIdx, endIdx), tempData.slice(startIdx, endIdx), hourlyWeather.slice(startIdx, endIdx), startIdx, true);
                fetchLocationName(currentLat, currentLon);
            } catch (e) {
                console.error(e);
            } finally {
                document.getElementById("updateBtn").disabled = false;
                document.getElementById("updateIcon").classList.remove("animate-spin");
                lucide.createIcons();
            }
        }

        function updateUI(current) {
            const now = new Date();
            const hour = now.getHours();
            const uv = uvData[hour] || 0;
            document.getElementById("uvValue").innerText = uv.toFixed(1);
            document.getElementById("currentTemp").innerText = Math.round(current.temperature) + "°";
            document.getElementById("currentWeatherDesc").innerText = getWeatherDesc(current.weathercode);
            document.getElementById("lastUpdate").innerText = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
            let start = -1, end = -1;
            for (let i = 0; i < 24; i++) {
                if (uvData[i] >= 6 && !isBadWeather(hourlyWeather[i])) {
                    if (start === -1) start = i;
                    end = i;
                }
            }
            document.getElementById("goldenTime").innerText = start !== -1 ? `${start} ~ ${end + 1}` : "오늘 없음";
            const badge = document.getElementById("uvBadge");
            const desc = document.getElementById("uvDesc");
            if (uv >= 8) {
                badge.innerText = "위험"; badge.className = "bg-red-500 text-white px-3 py-1.5 rounded-xl text-[11px] font-black uppercase tracking-wider relative -top-4";
                desc.innerText = "자외선이 매우 강합니다. 노출을 자제하세요.";
            } else if (uv >= 6) {
                badge.innerText = "최적"; badge.className = "bg-[#FF8A00] text-white px-3 py-1.5 rounded-xl text-[11px] font-black uppercase tracking-wider relative -top-4";
                desc.innerText = "태닝 효율이 최상인 골든타임입니다!";
            } else {
                badge.innerText = "낮음"; badge.className = "bg-gray-400 text-white px-3 py-1.5 rounded-xl text-[11px] font-black uppercase tracking-wider relative -top-4";
                desc.innerText = "자외선 지수가 낮습니다. 태닝 효율이 떨어집니다.";
            }
        }

        function drawScrollableChart(id, uvs, temps, codes, startTime, isToday) {
            const canvas = document.getElementById(id);
            if (!canvas) return;
            const ctx = canvas.getContext("2d");
            const wrapper = canvas.parentElement;
            const dpr = window.devicePixelRatio || 1;
            
            const step = 45; 
            const px = 24; 
            const totalWidth = (uvs.length - 1) * step + (px * 2);
            const h = 210;
            
            canvas.style.width = totalWidth + "px";
            canvas.width = totalWidth * dpr;
            canvas.height = h * dpr;
            ctx.scale(dpr, dpr);
            const nowH = new Date().getHours();
            ctx.clearRect(0, 0, totalWidth, h);

            uvs.forEach((uv, i) => {
                const x = px + i * step;
                const isRealNow = isToday && (startTime + i) === nowH;
                const isGolden = uv >= 6 && !isBadWeather(codes[i]);

                ctx.setLineDash([4, 4]);
                ctx.strokeStyle = isRealNow ? 'rgba(255, 138, 0, 0.7)' : 'rgba(0, 0, 0, 0.05)';
                ctx.lineWidth = isRealNow ? 2 : 1;
                ctx.beginPath(); ctx.moveTo(x, 5); ctx.lineTo(x, h - 30); ctx.stroke();
                ctx.setLineDash([]);

                if (isGolden) {
                    const grad = ctx.createLinearGradient(0, 5, 0, h);
                    grad.addColorStop(0, 'rgba(239, 68, 68, 0)');
                    grad.addColorStop(0.7, 'rgba(239, 68, 68, 0.3)'); 
                    grad.addColorStop(1, 'rgba(239, 68, 68, 0.02)'); 
                    ctx.fillStyle = grad;
                    ctx.fillRect(x - step/2, 5, step, h - 30);
                }
            });

            const tMin = Math.min(...temps), tMax = Math.max(...temps), tRange = (tMax - tMin) || 5;
            const getTempY = (t) => 85 - ((t - tMin) / tRange) * 30;
            ctx.beginPath();
            ctx.strokeStyle = 'rgba(96, 165, 250, 0.3)'; ctx.lineWidth = 1.5;
            temps.forEach((t, i) => {
                const x = px + i * step; 
                if (i === 0) ctx.moveTo(x, getTempY(t)); else ctx.lineTo(x, getTempY(t));
            });
            ctx.stroke();
            temps.forEach((t, i) => {
                const x = px + i * step;
                ctx.fillStyle = 'rgba(59, 130, 246, 0.8)';
                ctx.font = '700 9px Inter'; ctx.textAlign = 'center';
                ctx.fillText(Math.round(t) + "°", x, getTempY(t) - 8);
            });

            ctx.beginPath();
            ctx.strokeStyle = '#FF8A00'; ctx.lineWidth = 3;
            uvs.forEach((uv, i) => {
                const x = px + i * step;
                const y = 170 - (uv * 9); 
                if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
            });
            ctx.stroke();

            uvs.forEach((uv, i) => {
                const x = px + i * step;
                const hour = (startTime + i) % 24;
                const badW = isBadWeather(codes[i]);
                const isRealNow = isToday && (startTime + i) === nowH;
                const isGolden = uv >= 6 && !isBadWeather(codes[i]);

                ctx.font = '16px Inter'; ctx.textAlign = 'center';
                ctx.fillStyle = '#000';
                ctx.fillText(getWeatherEmoji(codes[i]), x, 25);
                
                const uvY = 170 - (uv * 9);
                ctx.fillStyle = badW ? '#CBD5E1' : (uv >= 6 ? '#EF4444' : '#FF8A00');
                ctx.beginPath(); ctx.arc(x, uvY, 4.5, 0, Math.PI * 2); ctx.fill();
                ctx.font = 'bold 11px Inter';
                ctx.fillText(uv.toFixed(1), x, uvY - 12);
                
                if (isGolden) {
                    ctx.fillStyle = '#EF4444'; 
                    ctx.font = '600 10px Inter'; 
                } else if (isRealNow) {
                    ctx.fillStyle = '#FF8A00';
                    ctx.font = 'bold 13px Inter'; 
                } else {
                    ctx.fillStyle = '#94A3B8';
                    ctx.font = '600 10px Inter';
                }
                ctx.fillText(hour, x, h - 10);
            });

            requestAnimationFrame(() => {
                let targetIdx = 0;
                let scrollPos = 0;
                
                if (isToday) {
                    targetIdx = uvs.findIndex((_, idx) => (startTime + idx) === nowH);
                    if(targetIdx === -1) targetIdx = 0;
                    scrollPos = (targetIdx * step) + px - (step * 1.5);
                } else {
                    let maxVal = -1;
                    uvs.forEach((v, idx) => {
                        if(v > maxVal) { maxVal = v; targetIdx = idx; }
                    });
                    scrollPos = (targetIdx * step) + px - (wrapper.offsetWidth / 2);
                }
                
                wrapper.scrollTo({ left: Math.max(0, scrollPos), behavior: 'smooth' });
            });
        }

        function renderWeekly() {
            const list = document.getElementById("weeklyList");
            if (!list) return;
            list.innerHTML = "";
            const dayNames = ["일", "월", "화", "수", "목", "금", "토"];
            for (let i = 0; i < 7; i++) {
                const date = new Date(); date.setDate(date.getDate() + i);
                const maxUv = weeklyData.uv_index_max[i], wCode = weeklyData.weather_code[i];
                const badW = isBadWeather(wCode), isOptimal = maxUv >= 6 && !badW;
                const row = document.createElement("div");
                row.className = "border-b border-slate-50 last:border-0";
                row.innerHTML = `
                    <div onclick="toggleDay(${i})" class="flex items-center justify-between py-5 cursor-pointer active:bg-slate-50 px-3 rounded-2xl transition-all group ${badW?'opacity-60':''}">
                        <div class="flex items-center gap-4">
                            <span class="w-9 font-black text-xs ${i===0?'text-blue-500':'text-slate-400'}">${i===0?'오늘':dayNames[date.getDay()]}</span>
                            <span class="text-2xl">${getWeatherEmoji(wCode)}</span>
                        </div>
                        <div class="flex-1 mx-5">
                            <div class="h-2 w-full bg-slate-100 rounded-full overflow-hidden shadow-inner">
                                <div class="h-full ${badW?'bg-slate-300':(isOptimal?'bg-orange-500':'bg-slate-300')}" style="width: ${Math.min(maxUv*10, 100)}%"></div>
                            </div>
                        </div>
                        <div class="flex items-center gap-3">
                            <span class="text-[13px] font-black ${isOptimal?'text-orange-500':'text-slate-400'}">${maxUv.toFixed(1)}</span>
                            <i data-lucide="chevron-down" id="arrow-${i}" class="w-4 h-4 text-slate-300 transition-transform duration-300"></i>
                        </div>
                    </div>
                    <div id="content-${i}" class="chart-container"><div class="scroll-chart-wrapper no-scrollbar"><canvas id="chart-${i}"></canvas></div></div>`;
                list.appendChild(row);
            }
            lucide.createIcons();
        }

        function toggleDay(i) {
            const content = document.getElementById(`content-${i}`);
            const arrow = document.getElementById(`arrow-${i}`);
            const isOpen = content.classList.contains('open');
            
            document.querySelectorAll('.chart-container').forEach(c => c.classList.remove('open'));
            document.querySelectorAll('[id^="arrow-"]').forEach(a => a.classList.remove('rotate-180'));
            
            if (!isOpen) {
                content.classList.add('open'); 
                arrow.classList.add('rotate-180');
                
                setTimeout(() => {
                    const startIdx = i * 24;
                    drawScrollableChart(`chart-${i}`, uvData.slice(startIdx, startIdx + 24), tempData.slice(startIdx, startIdx + 24), hourlyWeather.slice(startIdx, startIdx + 24), 0, false);
                }, 100);
            }
        }

        async function fetchLocationName(lat, lon) {
            try {
                const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`);
                const data = await res.json(); const a = data.address;
                document.getElementById("locationName").innerText = (a.city || a.province || "내 위치") + " " + (a.suburb || "");
            } catch { document.getElementById("locationName").innerText = "내 위치"; }
        }

        window.onload = () => { initLocation(); setInterval(initLocation, 600000); };
    </script>
</body>
</html>
