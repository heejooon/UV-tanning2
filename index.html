<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UV & Weather AI Tracker</title>
    <meta name="theme-color" content="#FF8A00"/>
    <link rel="manifest" href="manifest.json"/>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #F4F7FA; -webkit-tap-highlight-color: transparent; }
        .card { background: white; border-radius: 24px; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05); overflow: hidden; }
        .chart-container { max-height: 0; overflow: hidden; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); opacity: 0; }
        .chart-container.open { max-height: 300px; opacity: 1; padding-bottom: 20px; }
        .rotate-180 { transform: rotate(180deg); }
        @keyframes pulse-soft { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
        .animate-pulse-soft { animation: pulse-soft 2s infinite; }
        canvas { width: 100% !important; height: 190px !important; }
    </style>
</head>
<body class="p-4 md:p-8 max-w-2xl mx-auto pb-12">

    <div class="card p-6 mb-4 border border-white">
        <div class="flex items-center justify-between mb-6">
            <div class="flex flex-col">
                <span class="text-[11px] text-gray-400 font-black uppercase tracking-widest mb-1">UV INDEX</span>
                <div class="flex items-baseline gap-2">
                    <span id="uvValue" class="text-7xl font-black text-[#FF8A00] tracking-tighter leading-none">--</span>
                    <span id="uvBadge" class="bg-gray-200 text-gray-500 px-2.5 py-1 rounded-lg text-[10px] font-black uppercase tracking-wider relative -top-2">Loading</span>
                </div>
            </div>
            <div class="flex flex-col items-end">
                <span id="currentWeatherDesc" class="text-sm font-bold text-gray-400 mb-1">--</span>
                <span id="currentTemp" class="text-5xl font-black text-gray-800 leading-none">--°</span>
            </div>
        </div>
        
        <div class="bg-gray-50 rounded-2xl p-4 mb-6">
            <p id="uvDesc" class="text-gray-600 text-sm font-medium leading-relaxed italic">
                위치 정보를 확인하고 있습니다...
            </p>
        </div>

        <div class="flex justify-between items-center">
            <div class="flex items-center gap-3 text-gray-400">
                <div class="flex items-center gap-1.5 bg-white px-3 py-1.5 rounded-full shadow-sm border border-gray-100">
                    <i data-lucide="map-pin" class="w-3.5 h-3.5 text-blue-400"></i>
                    <span id="locationName" class="text-[11px] font-bold text-gray-600 truncate max-w-[100px]">위치 찾는 중...</span>
                </div>
                <div class="flex items-center gap-1.5 bg-white px-3 py-1.5 rounded-full shadow-sm border border-gray-100 text-[11px] font-bold text-gray-600">
                    <i data-lucide="clock" class="w-3.5 h-3.5 text-orange-400"></i>
                    <span id="lastUpdate">--:--</span>
                </div>
            </div>
            <button id="updateBtn" onclick="initLocation()" class="bg-[#FF8A00] hover:bg-orange-600 text-white p-3 rounded-full transition-all active:scale-90 shadow-lg shadow-orange-200">
                <i id="updateIcon" data-lucide="refresh-cw" class="w-5 h-5"></i>
            </button>
        </div>
    </div>

    <div class="card p-6 mb-4 bg-gradient-to-br from-orange-500 to-[#FF8A00] text-white">
        <div class="flex items-center gap-2 mb-2 opacity-90">
            <i data-lucide="zap" class="w-4 h-4 fill-current"></i>
            <h2 class="font-bold text-sm uppercase tracking-wider">오늘 태닝 골든타임</h2>
        </div>
        <div id="goldenTime" class="text-4xl font-black tracking-tight">-- ~ --시</div>
        <p class="text-[10px] mt-2 opacity-80 font-medium">* UV 지수 6 이상의 최적 노출 시간대입니다.</p>
    </div>

    <div class="card p-6 mb-4">
        <h2 class="text-gray-800 font-black text-lg mb-6 flex items-center gap-2">
            <i data-lucide="bar-chart-3" class="w-5 h-5 text-orange-500"></i>
            UV 타임라인 (09-18시)
        </h2>
        <div class="flex gap-4 mb-6 overflow-x-auto pb-2 no-scrollbar">
            <div class="flex items-center gap-1.5 shrink-0"><span class="w-3 h-3 rounded-full bg-[#FF8A00]"></span> <span class="text-[10px] font-bold text-gray-500">UV 지수</span></div>
            <div class="flex items-center gap-1.5 shrink-0"><span class="w-3 h-3 rounded-full border-2 border-gray-300 bg-white"></span> <span class="text-[10px] font-bold text-gray-500">온도(°C)</span></div>
            <div class="flex items-center gap-1.5 shrink-0"><span class="w-3 h-3 rounded bg-orange-100 border border-orange-200"></span> <span class="text-[10px] font-bold text-gray-500">골든타임</span></div>
        </div>
        <div class="relative w-full">
            <canvas id="uvChart"></canvas>
        </div>
    </div>

    <div class="card p-6 mb-4">
        <div class="flex items-center justify-between mb-4">
            <h2 class="text-gray-800 font-black text-lg flex items-center gap-2">
                <i data-lucide="calendar-days" class="w-5 h-5 text-blue-500"></i>
                주간 예보
            </h2>
            <span class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">7 Days</span>
        </div>
        <div id="weeklyList" class="space-y-2">
            <div class="flex justify-center py-10"><div class="w-6 h-6 border-4 border-orange-200 border-t-orange-500 rounded-full animate-spin"></div></div>
        </div>
    </div>

    <script>
        let uvData = [], tempData = [], hourlyWeather = [], weeklyData = [];
        let currentLat = 37.5038, currentLon = 126.7535;

        const weatherEmoji = { 0: "☀️", 1: "🌤️", 2: "⛅", 3: "☁️", 45: "🌫️", 48: "🌫️", 51: "🌦️", 53: "🌦️", 55: "🌦️", 61: "🌧️", 63: "🌧️", 65: "🌧️", 80: "🌦️", 81: "🌧️", 82: "🌧️", 95: "⚡", 96: "⛈️", 99: "⛈️" };
        const weatherMap = { 0: "맑음", 1: "대체로 맑음", 2: "구름 조금", 3: "흐림", 45: "안개", 51: "약한 이슬비", 61: "약한 비", 80: "소나기", 95: "뇌우" };

        function getWeatherEmoji(code) { return weatherEmoji[code] || "🌡️"; }
        function getWeatherDesc(code) { return weatherMap[code] || "보통"; }

        async function initLocation() {
            const btn = document.getElementById("updateBtn");
            const icon = document.getElementById("updateIcon");
            btn.disabled = true;
            icon.classList.add("animate-spin");

            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (pos) => { currentLat = pos.coords.latitude; currentLon = pos.coords.longitude; fetchData(); },
                    () => { fetchData(); },
                    { timeout: 5000 }
                );
            } else { fetchData(); }
        }

        async function fetchData() {
            try {
                const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${currentLat}&longitude=${currentLon}&hourly=uv_index,temperature_2m,weather_code&daily=uv_index_max,weather_code&current_weather=true&timezone=Asia%2FSeoul`);
                const data = await res.json();
                uvData = data.hourly.uv_index;
                tempData = data.hourly.temperature_2m;
                hourlyWeather = data.hourly.weather_code;
                weeklyData = data.daily;

                updateUI(data.current_weather);
                drawBaseChart("uvChart", uvData.slice(9, 19), tempData.slice(9, 19), hourlyWeather.slice(9, 19), true);
                fetchLocationName(currentLat, currentLon);
            } catch (e) {
                console.error(e);
                document.getElementById("uvDesc").innerText = "데이터 연결 실패";
            } finally {
                document.getElementById("updateBtn").disabled = false;
                document.getElementById("updateIcon").classList.remove("animate-spin");
                lucide.createIcons();
            }
        }

        function updateUI(current) {
            const now = new Date();
            const hour = now.getHours();
            const uv = uvData[hour] || 0;

            document.getElementById("uvValue").innerText = uv.toFixed(1);
            const badge = document.getElementById("uvBadge");
            const desc = document.getElementById("uvDesc");

            if (uv >= 8) { badge.innerText = "위험"; badge.className = "bg-red-500 text-white px-2.5 py-1 rounded-lg text-[10px] font-black"; desc.innerText = "자외선이 매우 강합니다. 피부 보호에 신경 쓰세요."; }
            else if (uv >= 6) { badge.innerText = "최적"; badge.className = "bg-orange-500 text-white px-2.5 py-1 rounded-lg text-[10px] font-black"; desc.innerText = "태닝하기에 가장 완벽한 자외선 강도입니다!"; }
            else if (uv >= 3) { badge.innerText = "보통"; badge.className = "bg-amber-400 text-white px-2.5 py-1 rounded-lg text-[10px] font-black"; desc.innerText = "적당한 자외선입니다. 가벼운 야외활동이 가능합니다."; }
            else { badge.innerText = "낮음"; badge.className = "bg-gray-400 text-white px-2.5 py-1 rounded-lg text-[10px] font-black"; desc.innerText = "현재 자외선이 약해 태닝 효율이 낮습니다."; }

            if (current) {
                document.getElementById("currentTemp").innerText = Math.round(current.temperature) + "°";
                document.getElementById("currentWeatherDesc").innerText = getWeatherDesc(current.weathercode);
            }
            document.getElementById("lastUpdate").innerText = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');

            let start = -1, end = -1;
            for (let i = 0; i < 24; i++) {
                if (uvData[i] >= 6) { if (start === -1) start = i; end = i; }
            }
            document.getElementById("goldenTime").innerText = start !== -1 ? `${start} ~ ${end + 1}시` : "오늘 없음";

            renderWeekly();
        }

        function renderWeekly() {
            const list = document.getElementById("weeklyList");
            list.innerHTML = "";
            const dayNames = ["일", "월", "화", "수", "목", "금", "토"];
            
            for (let i = 0; i < 7; i++) {
                const date = new Date();
                date.setDate(date.getDate() + i);
                const maxUv = weeklyData.uv_index_max[i];
                const emoji = getWeatherEmoji(weeklyData.weather_code[i]);
                const isOptimal = maxUv >= 6;

                const row = document.createElement("div");
                row.className = "border-b border-gray-50 last:border-0";
                row.innerHTML = `
                    <div onclick="toggleDay(${i})" class="flex items-center justify-between py-4 cursor-pointer active:bg-gray-50 px-2 rounded-xl transition-colors">
                        <div class="flex items-center gap-3">
                            <span class="w-8 font-black text-xs ${i===0?'text-blue-500':'text-gray-400'}">${i===0?'오늘':dayNames[date.getDay()]}</span>
                            <span class="text-xl">${emoji}</span>
                        </div>
                        <div class="flex-1 mx-4">
                            <div class="h-1.5 w-full bg-gray-100 rounded-full overflow-hidden">
                                <div class="h-full ${isOptimal?'bg-orange-500':'bg-gray-300'}" style="width: ${Math.min(maxUv*10, 100)}%"></div>
                            </div>
                        </div>
                        <div class="flex items-center gap-2">
                            <span class="text-xs font-black ${isOptimal?'text-orange-500':'text-gray-400'}">${maxUv.toFixed(1)}</span>
                            <i data-lucide="chevron-down" id="arrow-${i}" class="w-4 h-4 text-gray-300 transition-transform"></i>
                        </div>
                    </div>
                    <div id="content-${i}" class="chart-container">
                        <canvas id="chart-${i}"></canvas>
                    </div>
                `;
                list.appendChild(row);
            }
            lucide.createIcons();
        }

        function toggleDay(i) {
            const content = document.getElementById(`content-${i}`);
            const arrow = document.getElementById(`arrow-${i}`);
            const isOpen = content.classList.contains('open');
            
            document.querySelectorAll('.chart-container').forEach(c => c.classList.remove('open'));
            document.querySelectorAll('[id^="arrow-"]').forEach(a => a.classList.remove('rotate-180'));

            if (!isOpen) {
                content.classList.add('open');
                arrow.classList.add('rotate-180');
                const startIdx = i * 24 + 9;
                setTimeout(() => {
                    drawBaseChart(`chart-${i}`, uvData.slice(startIdx, startIdx + 10), tempData.slice(startIdx, startIdx + 10), hourlyWeather.slice(startIdx, startIdx + 10), i === 0);
                }, 50);
            }
        }

        function drawBaseChart(id, uvs, temps, codes, isToday) {
            const canvas = document.getElementById(id);
            if (!canvas) return;
            const ctx = canvas.getContext("2d");
            const dpr = window.devicePixelRatio || 1;
            const rect = canvas.getBoundingClientRect();
            
            canvas.width = rect.width * dpr;
            canvas.height = 190 * dpr;
            ctx.scale(dpr, dpr);

            const w = rect.width, h = 190, px = 25, pt = 35, pb = 45;
            const cw = w - px * 2, ch = h - pt - pb;
            const step = cw / (uvs.length - 1);
            const nowH = new Date().getHours();

            ctx.clearRect(0, 0, w, h);

            // 1. Draw Golden Area Background
            ctx.fillStyle = "rgba(255, 138, 0, 0.08)";
            uvs.forEach((v, i) => {
                if (v >= 6) {
                    const x = px + i * step;
                    ctx.fillRect(x - step/2, pt, step, ch);
                }
            });

            // 2. Draw Vertical Dashed Lines (Guide lines)
            uvs.forEach((v, i) => {
                const x = px + i * step;
                const isCurrent = isToday && (i + 9 === nowH);

                ctx.beginPath();
                ctx.setLineDash([4, 4]); // DASHED LINE
                ctx.strokeStyle = isCurrent ? "rgba(255, 138, 0, 0.4)" : "#E2E8F0";
                ctx.lineWidth = isCurrent ? 2 : 1;
                ctx.moveTo(x, pt);
                ctx.lineTo(x, h - pb);
                ctx.stroke();
                ctx.setLineDash([]); // Reset to solid
            });

            // 3. Draw UV Line
            ctx.beginPath();
            ctx.strokeStyle = "#FF8A00";
            ctx.lineWidth = 4;
            ctx.lineJoin = "round";
            uvs.forEach((v, i) => {
                const x = px + i * step, y = h - pb - (v / 12) * ch;
                if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
            });
            ctx.stroke();

            // 4. Points and Labels
            uvs.forEach((v, i) => {
                const x = px + i * step, y = h - pb - (v / 12) * ch;
                const isCurrent = isToday && (i + 9 === nowH);

                // Temperature
                ctx.fillStyle = "#94A3B8";
                ctx.font = "bold 9px Inter";
                ctx.textAlign = "center";
                ctx.fillText(Math.round(temps[i]) + "°", x, pt - 10);

                // UV Point
                ctx.beginPath();
                ctx.arc(x, y, isCurrent ? 6 : 4, 0, Math.PI * 2);
                ctx.fillStyle = v >= 6 ? "#FF8A00" : "#CBD5E1";
                if (isCurrent) {
                    ctx.shadowColor = "#FF8A00";
                    ctx.shadowBlur = 10;
                }
                ctx.fill();
                ctx.shadowBlur = 0;
                ctx.strokeStyle = "white";
                ctx.lineWidth = 2;
                ctx.stroke();

                // UV Value Label
                ctx.fillStyle = isCurrent ? "#1E293B" : "#94A3B8";
                ctx.font = isCurrent ? "black 11px Inter" : "bold 10px Inter";
                ctx.fillText(v.toFixed(1), x, y - 12);

                // Time and Emoji
                ctx.fillStyle = isCurrent ? "#FF8A00" : "#94A3B8";
                ctx.font = isCurrent ? "black 10px Inter" : "medium 9px Inter";
                ctx.fillText((i + 9) + "시", x, h - pb + 15);
                ctx.font = "14px Inter";
                ctx.fillText(getWeatherEmoji(codes[i]), x, h - 10);
            });
        }

        async function fetchLocationName(lat, lon) {
            try {
                const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`);
                const data = await res.json();
                const a = data.address;
                document.getElementById("locationName").innerText = (a.city || a.province || a.town || "내 위치") + " " + (a.suburb || "");
            } catch { document.getElementById("locationName").innerText = "내 위치"; }
        }

        window.onload = () => {
            initLocation();
            setInterval(initLocation, 600000);
            if ("serviceWorker" in navigator && window.location.protocol.startsWith('http')) {
                navigator.serviceWorker.register("./sw.js").catch(() => {});
            }
        };
    </script>
</body>
</html>
