<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UV & Weather AI Tracker</title>
    <meta name="theme-color" content="#FF8A00"/>
    <link rel="manifest" href="manifest.json"/>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #F8FAFC; -webkit-tap-highlight-color: transparent; }
        .card { background: white; border-radius: 28px; box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.04); overflow: hidden; border: 1px solid rgba(0,0,0,0.02); }
        .chart-container { max-height: 0; overflow: hidden; transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); opacity: 0; }
        .chart-container.open { max-height: 320px; opacity: 1; padding-bottom: 20px; }
        .rotate-180 { transform: rotate(180deg); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .scroll-chart-wrapper { 
            width: 100%; 
            overflow-x: auto; 
            cursor: grab;
            position: relative;
            scroll-behavior: smooth;
        }
        canvas { display: block; height: 200px !important; }
        
        .btn-update { background: #FF8A00; box-shadow: 0 4px 12px rgba(255, 138, 0, 0.3); }
    </style>
</head>
<body class="p-4 md:p-8 max-w-2xl mx-auto pb-16">

    <div class="card p-7 mb-5 relative">
        <div class="flex items-center justify-between mb-8">
            <div class="flex flex-col">
                <span class="text-[11px] text-gray-400 font-black uppercase tracking-[0.2em] mb-2">Current UV Index</span>
                <div class="flex items-baseline gap-3">
                    <span id="uvValue" class="text-8xl font-black text-[#FF8A00] tracking-tighter leading-none">--</span>
                    <span id="uvBadge" class="bg-gray-100 text-gray-400 px-3 py-1.5 rounded-xl text-[11px] font-black uppercase tracking-wider relative -top-4 transition-all duration-500">Wait</span>
                </div>
            </div>
            <div class="flex flex-col items-end">
                <span id="currentWeatherDesc" class="text-sm font-bold text-gray-400 mb-1">--</span>
                <span id="currentTemp" class="text-5xl font-black text-gray-800 leading-none tracking-tight">--°</span>
            </div>
        </div>
        
        <div class="bg-slate-50 rounded-2xl p-5 mb-8 border border-slate-100/50">
        <div class="bg-slate-50 rounded-2xl p-3.5 mb-6 border border-slate-100/50">
            <p id="uvDesc" class="text-slate-600 text-[13px] font-semibold leading-relaxed break-keep" style="word-break: keep-all;">
                현재 위치의 기상 정보를 분석하고 있습니다...
            </p>
        </div>

        <div class="flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="flex items-center gap-1.5 bg-slate-100/50 px-3 py-2 rounded-full border border-slate-200/50">
                    <i data-lucide="map-pin" class="w-3.5 h-3.5 text-blue-500"></i>
                    <span id="locationName" class="text-[11px] font-bold text-slate-600 truncate max-w-[120px]">위치 찾는 중...</span>
                </div>
                <div class="flex items-center gap-1.5 bg-slate-100/50 px-3 py-2 rounded-full border border-slate-200/50">
                    <i data-lucide="clock" class="w-3.5 h-3.5 text-orange-400"></i>
                    <span id="lastUpdate" class="text-[11px] font-bold text-slate-600">--:--</span>
                </div>
            </div>
            <button id="updateBtn" onclick="initLocation()" class="btn-update text-white w-12 h-12 rounded-2xl flex items-center justify-center transition-all active:scale-95 hover:brightness-110 shadow-lg shrink-0">
                <i id="updateIcon" data-lucide="refresh-cw" class="w-5 h-5"></i>
            </button>
        </div>
    </div>

    <div class="card p-7 mb-5 bg-gradient-to-br from-orange-500 to-[#FF8A00] text-white border-none shadow-orange-200">
        <div class="flex items-center gap-2 mb-3 opacity-90">
            <div class="p-1.5 bg-white/20 rounded-lg">
                <i data-lucide="zap" class="w-4 h-4 fill-current"></i>
            </div>
            <h2 class="font-bold text-xs uppercase tracking-widest">Today's Golden Time</h2>
        </div>
        <div id="goldenTime" class="text-5xl font-black tracking-tighter">-- ~ --</div>
    </div>

    <div class="card p-7 mb-5">
        <div class="flex items-center justify-between mb-6">
            <h2 class="text-slate-800 font-black text-xl flex items-center gap-2.5 tracking-tight">
                <i data-lucide="bar-chart-3" class="w-6 h-6 text-orange-500"></i>
                UV 타임라인
            </h2>
            <div class="flex items-center gap-1 bg-slate-100 px-2 py-1 rounded-md">
                <i data-lucide="move-horizontal" class="w-3 h-3 text-slate-400"></i>
                <span class="text-[9px] font-bold text-slate-400 uppercase">Slide</span>
            </div>
        </div>
        
        <div class="flex gap-4 mb-6 overflow-x-auto pb-1 no-scrollbar">
            <div class="flex items-center gap-1.5 shrink-0"><span class="w-2.5 h-2.5 rounded-full bg-[#FF8A00]"></span> <span class="text-[10px] font-black text-slate-400 uppercase">UV Index</span></div>
            <div class="flex items-center gap-1.5 shrink-0"><span class="w-2.5 h-2.5 rounded-full bg-blue-400"></span> <span class="text-[10px] font-black text-slate-400 uppercase">Temp</span></div>
            <div class="flex items-center gap-1.5 shrink-0"><span class="w-4 h-2 rounded bg-red-100 border border-red-200"></span> <span class="text-[10px] font-black text-slate-400 uppercase">Golden</span></div>
        </div>

        <div id="mainChartWrapper" class="scroll-chart-wrapper no-scrollbar">
            <canvas id="uvChart"></canvas>
        </div>
    </div>

    <div class="card p-7 mb-5">
        <div class="flex items-center justify-between mb-6">
            <h2 class="text-slate-800 font-black text-xl flex items-center gap-2.5 tracking-tight">
                <i data-lucide="calendar-days" class="w-6 h-6 text-blue-500"></i>
                주간 태닝 예보
            </h2>
            <span class="text-[10px] font-black text-slate-300 uppercase tracking-widest">7 Days</span>
        </div>
        <div id="weeklyList" class="space-y-1">
            <div class="flex justify-center py-12"><div class="w-8 h-8 border-[4px] border-orange-100 border-t-orange-500 rounded-full animate-spin"></div></div>
        </div>
    </div>

    <script>
        let uvData = [], tempData = [], hourlyWeather = [], weeklyData = [];
        let currentLat = 37.5038, currentLon = 126.7535;

        const weatherEmoji = { 0: "☀️", 1: "🌤️", 2: "⛅", 3: "☁️", 45: "🌫️", 48: "🌫️", 51: "🌦️", 53: "🌦️", 55: "🌦️", 61: "🌧️", 63: "🌧️", 65: "🌧️", 80: "🌦️", 81: "🌧️", 82: "🌧️", 95: "⚡", 96: "⛈️", 99: "⛈️" };
        const weatherMap = { 0: "맑음", 1: "대체로 맑음", 2: "구름 조금", 3: "흐림", 45: "안개", 51: "약한 이슬비", 61: "약한 비", 80: "소나기", 95: "뇌우" };

        function getWeatherEmoji(code) { return weatherEmoji[code] || "🌡️"; }
        function getWeatherDesc(code) { return weatherMap[code] || "보통"; }

        async function initLocation() {
            const btn = document.getElementById("updateBtn");
            const icon = document.getElementById("updateIcon");
            btn.disabled = true;
            icon.classList.add("animate-spin");

            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (pos) => { currentLat = pos.coords.latitude; currentLon = pos.coords.longitude; fetchData(); },
                    () => { fetchData(); },
                    { timeout: 6000 }
                );
            } else { fetchData(); }
        }

        async function fetchData() {
            try {
                const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${currentLat}&longitude=${currentLon}&hourly=uv_index,temperature_2m,weather_code&daily=uv_index_max,weather_code&current_weather=true&timezone=Asia%2FSeoul`);
                const data = await res.json();
                uvData = data.hourly.uv_index;
                tempData = data.hourly.temperature_2m;
                hourlyWeather = data.hourly.weather_code;
                weeklyData = data.daily;

                updateUI(data.current_weather);
                
                const nowH = new Date().getHours();
                const startIdx = Math.max(0, nowH - 3);
                const endIdx = Math.min(uvData.length, nowH + 25);
                
                drawScrollableChart(
                    "uvChart", 
                    uvData.slice(startIdx, endIdx), 
                    tempData.slice(startIdx, endIdx), 
                    hourlyWeather.slice(startIdx, endIdx), 
                    startIdx, 
                    true
                );
                
                fetchLocationName(currentLat, currentLon);
            } catch (e) {
                document.getElementById("uvDesc").innerText = "데이터 연결에 실패했습니다.";
            } finally {
                document.getElementById("updateBtn").disabled = false;
                document.getElementById("updateIcon").classList.remove("animate-spin");
                lucide.createIcons();
            }
        }

        function updateUI(current) {
            const now = new Date();
            const hour = now.getHours();
            const uv = uvData[hour] || 0;

            document.getElementById("uvValue").innerText = uv.toFixed(1);
            const badge = document.getElementById("uvBadge");
            const desc = document.getElementById("uvDesc");

            if (uv >= 8) { 
                badge.innerText = "위험"; 
                badge.className = "bg-red-500 text-white px-2.5 py-1.5 rounded-xl text-[10px] font-black uppercase relative -top-4 transition-all"; 
                desc.innerText = "자외선이 매우 강력합니다. 태닝보다 피부 보호가 우선입니다."; 
            }
            else if (uv >= 6) { 
                badge.innerText = "최적"; 
                badge.className = "bg-orange-500 text-white px-2.5 py-1.5 rounded-xl text-[10px] font-black uppercase relative -top-4 transition-all"; 
                desc.innerText = "현재 태닝 효율이 최고조입니다! 골든타임을 활용하세요."; 
            }
            else if (uv >= 3) { 
                badge.innerText = "보통"; 
                badge.className = "bg-amber-400 text-white px-2.5 py-1.5 rounded-xl text-[10px] font-black uppercase relative -top-4 transition-all"; 
                desc.innerText = "적당한 자외선입니다. 가벼운 야외 활동을 추천합니다."; 
            }
            else { 
                badge.innerText = "낮음"; 
                badge.className = "bg-slate-400 text-white px-2.5 py-1.5 rounded-xl text-[10px] font-black uppercase relative -top-4 transition-all"; 
                desc.innerText = "현재 자외선이 약합니다. 태닝 효율이 다소 떨어집니다."; 
            }

            if (current) {
                document.getElementById("currentTemp").innerText = Math.round(current.temperature) + "°";
                document.getElementById("currentWeatherDesc").innerText = getWeatherDesc(current.weathercode);
            }
            document.getElementById("lastUpdate").innerText = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');

            let start = -1, end = -1;
            for (let i = 0; i < 24; i++) {
                if (uvData[i] >= 6) { if (start === -1) start = i; end = i; }
            }
            document.getElementById("goldenTime").innerText = start !== -1 ? `${start}:00 ~ ${end + 1}:00` : "오늘 없음";

            renderWeekly();
        }

        function renderWeekly() {
            const list = document.getElementById("weeklyList");
            list.innerHTML = "";
            const dayNames = ["일", "월", "화", "수", "목", "금", "토"];
            for (let i = 0; i < 7; i++) {
                const date = new Date(); date.setDate(date.getDate() + i);
                const maxUv = weeklyData.uv_index_max[i];
                const emoji = getWeatherEmoji(weeklyData.weather_code[i]);
                const isOptimal = maxUv >= 6;
                const row = document.createElement("div");
                row.className = "border-b border-slate-50 last:border-0";
                row.innerHTML = `
                    <div onclick="toggleDay(${i})" class="flex items-center justify-between py-5 cursor-pointer active:bg-slate-50 px-3 rounded-2xl transition-all group">
                        <div class="flex items-center gap-4">
                            <span class="w-9 font-black text-xs ${i===0?'text-blue-500':'text-slate-400'}">${i===0?'오늘':dayNames[date.getDay()]}</span>
                            <span class="text-2xl">${emoji}</span>
                        </div>
                        <div class="flex-1 mx-5">
                            <div class="h-2 w-full bg-slate-100 rounded-full overflow-hidden shadow-inner">
                                <div class="h-full ${isOptimal?'bg-orange-500':'bg-slate-300'}" style="width: ${Math.min(maxUv*10, 100)}%"></div>
                            </div>
                        </div>
                        <div class="flex items-center gap-3"><span class="text-[13px] font-black ${isOptimal?'text-orange-500':'text-slate-400'}">${maxUv.toFixed(1)}</span><i data-lucide="chevron-down" id="arrow-${i}" class="w-4 h-4 text-slate-300 transition-transform duration-300"></i></div>
                    </div>
                    <div id="content-${i}" class="chart-container"><div class="scroll-chart-wrapper no-scrollbar"><canvas id="chart-${i}"></canvas></div></div>`;
                list.appendChild(row);
            }
            lucide.createIcons();
        }

        function toggleDay(i) {
            const content = document.getElementById(`content-${i}`);
            const arrow = document.getElementById(`arrow-${i}`);
            const isOpen = content.classList.contains('open');
            document.querySelectorAll('.chart-container').forEach(c => c.classList.remove('open'));
            document.querySelectorAll('[id^="arrow-"]').forEach(a => a.classList.remove('rotate-180'));
            if (!isOpen) {
                content.classList.add('open');
                arrow.classList.add('rotate-180');
                setTimeout(() => {
                    const startIdx = i * 24;
                    drawScrollableChart(`chart-${i}`, uvData.slice(startIdx, startIdx + 25), tempData.slice(startIdx, startIdx + 25), hourlyWeather.slice(startIdx, startIdx + 25), 0, i === 0);
                }, 100);
            }
        }

        function drawScrollableChart(id, uvs, temps, codes, startTime, isToday) {
            const canvas = document.getElementById(id);
            if (!canvas) return;
            const ctx = canvas.getContext("2d");
            const wrapper = canvas.parentElement;
            const dpr = window.devicePixelRatio || 1;
            
            const viewportWidth = wrapper.clientWidth;
            const unitWidth = viewportWidth / 8; 
            const totalWidth = unitWidth * uvs.length;
            
            canvas.style.width = totalWidth + "px";
            canvas.width = totalWidth * dpr;
            canvas.height = 200 * dpr;
            ctx.scale(dpr, dpr);

            const h = 200, px = 25;
            const step = (totalWidth - px * 2) / (uvs.length - 1);
            const nowH = new Date().getHours();

            ctx.clearRect(0, 0, totalWidth, h);

            // --- Y 축 레이어 설정 ---
            const WEATHER_Y = 22;      
            const TEMP_Y = 50;         
            const UV_TOP = 80;         
            const UV_BOTTOM = 150;     
            const TIME_Y = 185;        

            // 1. 골든 타임 영역 (천장까지 확장)
            const grad = ctx.createLinearGradient(0, 0, 0, UV_BOTTOM);
            grad.addColorStop(0, "rgba(239, 68, 68, 0.15)");
            grad.addColorStop(1, "rgba(239, 68, 68, 0.0)");
            ctx.fillStyle = grad;
            uvs.forEach((v, i) => {
                if (v >= 6) {
                    const x = px + i * step;
                    ctx.fillRect(x - step/2, 0, step, UV_BOTTOM);
                }
            });

            // 2. 수직 가이드 점선
            uvs.forEach((v, i) => {
                const x = px + i * step;
                const currentHourLabel = (startTime + i) % 24;
                const isCurrent = isToday && (currentHourLabel === nowH);
                
                ctx.beginPath();
                ctx.setLineDash([4, 4]);
                ctx.strokeStyle = isCurrent ? "rgba(255, 138, 0, 0.6)" : "#F1F5F9";
                ctx.lineWidth = isCurrent ? 2 : 1;
                ctx.moveTo(x, 5);
                ctx.lineTo(x, UV_BOTTOM);
                ctx.stroke();
                ctx.setLineDash([]);
            });

            // 3. 온도 추세 점선
            ctx.beginPath();
            ctx.strokeStyle = "rgba(96, 165, 250, 0.7)";
            ctx.lineWidth = 1.5;
            ctx.setLineDash([2, 2]);
            const minT = Math.min(...temps), maxT = Math.max(...temps), tR = (maxT - minT) || 5;
            temps.forEach((t, i) => {
                const x = px + i * step;
                const y = (TEMP_Y + 12) - ((t - minT) / tR) * 10;
                if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
            });
            ctx.stroke();
            ctx.setLineDash([]);

            // 4. UV 지수 굵은 메인 곡선
            ctx.beginPath();
            ctx.strokeStyle = "#FF8A00";
            ctx.lineWidth = 3.5;
            ctx.lineJoin = "round";
            uvs.forEach((v, i) => {
                const x = px + i * step;
                const y = UV_BOTTOM - (v / 12) * (UV_BOTTOM - UV_TOP);
                if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
            });
            ctx.stroke();

            // 5. 포인트 및 텍스트 렌더링
            uvs.forEach((v, i) => {
                const x = px + i * step;
                const currentHourLabel = (startTime + i) % 24;
                const isCurrent = isToday && (currentHourLabel === nowH);
                const isGolden = v >= 6;

                // 날씨 아이콘 (상단 고정 축)
                ctx.font = "16px Inter";
                ctx.textAlign = "center";
                ctx.fillText(getWeatherEmoji(codes[i]), x, WEATHER_Y);

                // 온도 수치 (아이콘 하단 고정)
                ctx.fillStyle = "#94A3B8";
                ctx.font = "bold 9px Inter";
                ctx.fillText(Math.round(temps[i]) + "°", x, TEMP_Y);

                // UV 포인트
                const uvY = UV_BOTTOM - (v / 12) * (UV_BOTTOM - UV_TOP);
                ctx.beginPath();
                ctx.arc(x, uvY, isCurrent ? 6 : 4, 0, Math.PI * 2);
                ctx.fillStyle = isGolden ? "#EF4444" : "#FF8A00";
                ctx.fill();
                ctx.strokeStyle = "white";
                ctx.lineWidth = 1.5;
                ctx.stroke();

                // UV 수치
                ctx.fillStyle = isCurrent ? "#1E293B" : "#94A3B8";
                ctx.font = isCurrent ? "900 11px Inter" : "bold 10px Inter";
                ctx.fillText(v.toFixed(1), x, uvY - 10);

                // 시간 축 (숫자만 표시, 골든타임일 경우 빨간색 강조)
                if (isCurrent) {
                    ctx.fillStyle = "#FF8A00";
                    ctx.font = "900 11px Inter";
                } else if (isGolden) {
                    ctx.fillStyle = "#EF4444";
                    ctx.font = "900 11px Inter";
                } else {
                    ctx.fillStyle = "#94A3B8";
                    ctx.font = "bold 10px Inter";
                }
                ctx.fillText(currentHourLabel, x, TIME_Y);
            });

            // 스크롤 위치 제어
            if (isToday && id === "uvChart") {
                // 타임라인: 현재 시간 기준 센터링
                const scrollPos = px + (nowH - startTime) * step - (viewportWidth / 2);
                wrapper.scrollLeft = scrollPos;
            } else {
                // 주간 예보: 자외선 최고점 기준 센터링
                let maxVal = -1;
                let maxIdx = 0;
                uvs.forEach((val, idx) => {
                    if (val > maxVal) { maxVal = val; maxIdx = idx; }
                });
                const scrollPos = px + maxIdx * step - (viewportWidth / 2);
                wrapper.scrollLeft = scrollPos;
            }
        }

        async function fetchLocationName(lat, lon) {
            try {
                const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`);
                const data = await res.json(); const a = data.address;
                document.getElementById("locationName").innerText = (a.city || a.province || a.town || "내 위치") + " " + (a.suburb || "");
            } catch { document.getElementById("locationName").innerText = "내 위치"; }
        }

        window.onload = () => {
            initLocation();
            setInterval(initLocation, 600000);
            if ("serviceWorker" in navigator && window.location.protocol.startsWith('http')) {
                navigator.serviceWorker.register("./sw.js").catch(() => {});
            }
        };
    </script>
</body>
</html>
